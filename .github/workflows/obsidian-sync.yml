
# ============================================================
# Obsidian Sync — GitHub Actions 자동화 워크플로우
# ============================================================

name: 🔄 Obsidian Vault Sync

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'connectors/**'
      - 'workflows/**'
      - 'scripts/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-to-obsidian:
    name: Sync to Obsidian Vault
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install python-frontmatter PyYAML

      - name: 📅 Get current date (KST)
        id: date
        run: |
          echo "DATE=$(TZ='Asia/Seoul' date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "DATETIME=$(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M')" >> "$GITHUB_ENV"
          echo "YEAR=$(TZ='Asia/Seoul' date +'%Y')" >> "$GITHUB_ENV"
          echo "date=$(TZ='Asia/Seoul' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: 🏗️ Create Obsidian vault structure
        run: |
          mkdir -p obsidian-vault/00-Dashboard
          mkdir -p obsidian-vault/01-Daily-Notes/${{ env.YEAR }}
          mkdir -p obsidian-vault/02-Claude-MCP
          mkdir -p obsidian-vault/03-Connectors
          mkdir -p obsidian-vault/04-Workflows
          mkdir -p obsidian-vault/05-Templates
          mkdir -p obsidian-vault/06-Archive
          echo "Vault structure created"

      - name: 📋 Inject frontmatter
        run: |
          python3 << 'PYEOF'
          import os, glob
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          today = now.strftime("%Y-%m-%d")
          timestamp = now.strftime("%Y-%m-%d %H:%M")

          def inject_frontmatter(filepath, extra_tags=None):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              if content.startswith('---'):
                  return False
              filename = os.path.basename(filepath)
              title = os.path.splitext(filename)[0].replace('-', ' ').replace('_', ' ')
              tags = ["claude-mcp", "auto-generated"]
              if extra_tags:
                  tags.extend(extra_tags)
              fm = f'---\ntitle: "{title}"\ndate: {today}\nupdated: {timestamp}\ntags: {tags}\nsource: github\n---\n\n'
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(fm + content)
              return True

          for f in glob.glob('connectors/**/*.md', recursive=True):
              if inject_frontmatter(f, ['connector', 'prompt']):
                  print(f"FM injected: {f}")

          for f in glob.glob('workflows/**/*.md', recursive=True):
              if inject_frontmatter(f, ['workflow', 'automation']):
                  print(f"FM injected: {f}")

          print("Frontmatter injection complete")
          PYEOF

      - name: 📂 Copy files to vault
        run: |
          cp -r connectors/* obsidian-vault/03-Connectors/ 2>/dev/null || true
          cp -r workflows/* obsidian-vault/04-Workflows/ 2>/dev/null || true
          cp claude_desktop_config.json obsidian-vault/02-Claude-MCP/ 2>/dev/null || true
          echo "Files copied"

      - name: 📅 Generate Daily Note
        run: |
          DAILY_DIR="obsidian-vault/01-Daily-Notes/$YEAR"
          DAILY_PATH="$DAILY_DIR/$DATE.md"
          mkdir -p "$DAILY_DIR"
          if [ ! -f "$DAILY_PATH" ]; then
            python3 << PYEOF
          import os
          date = os.environ.get('DATE', '2026-06-07')
          dt = os.environ.get('DATETIME', '2026-06-07 09:00')
          year = os.environ.get('YEAR', '2026')
          path = f"obsidian-vault/01-Daily-Notes/{year}/{date}.md"
          content = f"""---
          title: "{date} 일일 노트"
          date: {date}
          type: daily-note
          tags:
            - daily-note
            - claude-mcp
            - auto-generated
          ---

          # 📅 {date}

          > 자동 생성: {dt} (KST)

          ## 🎯 오늘의 목표
          - [ ] 
          - [ ] 
          - [ ] 

          ## 🤖 Claude MCP 작업
          - [ ] Gmail 확인
          - [ ] Calendar 일정 검토  
          - [ ] Notion 업데이트

          ## 💡 메모


          ## ✅ 완료한 일


          ## 🔗 관련 노트
          [[00-Dashboard/Home]]
          """
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          print(f"Daily note created: {path}")
          PYEOF
          else
            echo "Daily note already exists: $DAILY_PATH"
          fi

      - name: 🏠 Update Dashboard
        run: |
          python3 << PYEOF
          import os
          date = os.environ.get('DATE', '2026-06-07')
          dt = os.environ.get('DATETIME', '2026-06-07 09:00')
          year = os.environ.get('YEAR', '2026')
          content = f"""---
          title: "Claude MCP Workspace Dashboard"
          date: {date}
          updated: {dt}
          type: dashboard
          tags:
            - dashboard
            - claude-mcp
            - home
          pinned: true
          ---

          # 🤖 Claude MCP Workspace

          > **마지막 동기화**: {dt} (KST)
          > GitHub Actions 자동 연동 ✅

          ---

          ## 📊 커넥터 현황

          | 서비스 | 상태 | 기능 |
          |---|---|---|
          | Gmail | ✅ 완료 | 읽기, 초안 작성 |
          | Google Calendar | ✅ 완료 | 일정 조회/생성 |
          | Google Drive | ✅ 완료 | 파일 읽기/쓰기 |
          | Google Sheets | ✅ 완료 | 데이터 읽기/쓰기 |
          | Notion | ✅ 완료 | 페이지 읽기/작성 |
          | Slack | ⏳ 설정 필요 | 메시지 전송 |

          ---

          ## 🗂️ Vault 구조

          - [[01-Daily-Notes/{year}/{date}|📅 오늘 일일 노트]]
          - [[02-Claude-MCP/MCP-Setup-Guide|⚙️ MCP 설정 가이드]]
          - [[03-Connectors/all_prompts|📚 프롬프트 모음]]
          - [[04-Workflows/morning_briefing|🌅 아침 브리핑]]
          - [[05-Templates/Daily-Note-Template|📝 일일 노트 템플릿]]

          ---

          ## ⚡ 빠른 프롬프트

          ```
          오늘 캘린더 일정이랑 Gmail 중요 메일 요약해줘
          ```

          ```
          Notion에 오늘 날짜 대시보드 페이지 만들어줘
          ```

          ---

          ## 📌 이번 주 일일 노트 (Dataview)

          ```dataview
          TABLE date, file.ctime as 생성시각
          FROM "01-Daily-Notes"
          WHERE type = "daily-note"
          SORT date DESC
          LIMIT 7
          ```

          ---

          *🔄 GitHub Actions 자동 업데이트 | [GitHub](https://github.com/aigw2026-cpu/claude-mcp-workspace)*
          """
          os.makedirs('obsidian-vault/00-Dashboard', exist_ok=True)
          with open('obsidian-vault/00-Dashboard/Home.md', 'w', encoding='utf-8') as f:
              f.write(content)
          print("Dashboard updated")
          PYEOF

      - name: 🔍 Validate vault
        run: |
          echo "=== Vault 구조 ==="
          find obsidian-vault -name "*.md" | sort
          echo "총 파일 수: $(find obsidian-vault -name '*.md' | wc -l)"

      - name: 💾 Commit vault changes
        run: |
          git config --global user.name "Claude MCP Bot"
          git config --global user.email "claude-mcp-bot@aigw2026.dev"
          git add obsidian-vault/ connectors/ workflows/ || true
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 스킵"
          else
            git commit -m "🔄 obsidian: auto-sync $DATETIME (KST)"
            git push origin main
            echo "Vault 커밋 & 푸시 완료"
          fi
