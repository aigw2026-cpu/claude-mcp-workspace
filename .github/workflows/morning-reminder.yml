
name: Morning Reminder

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  morning-checklist:
    runs-on: ubuntu-latest
    name: Morning 10AM Checklist
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate morning report
        run: |
          mkdir -p obsidian-vault/08-Morning-Reports
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          REPORT="obsidian-vault/08-Morning-Reports/$DATE.md"
          if [ ! -f "$REPORT" ]; then
            if [ -f "TOMORROW-10AM-CHECKLIST.md" ]; then
              cp TOMORROW-10AM-CHECKLIST.md "$REPORT"
            else
              printf '# %s Morning Checklist\nSee: https://github.com/aigw2026-cpu/claude-mcp-workspace/blob/main/TOMORROW-10AM-CHECKLIST.md\n' "$DATE" > "$REPORT"
            fi
            echo "Created: $REPORT"
          else
            echo "Already exists: $REPORT"
          fi

      - name: Commit report
        run: |
          git config --local user.email "claude-mcp-bot@aigw2026.github"
          git config --local user.name "Claude MCP Bot"
          git add obsidian-vault/08-Morning-Reports/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')
            git commit -m "morning: daily checklist $DATE"
            git push
          fi
