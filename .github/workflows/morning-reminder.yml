업데이트된 Chrome에서:
1. https://smithery.run/aigw2026/slack/setup 접속
2. aigw2026@gmail.com 입력
3. Slack 로그인 → Allow 클릭
4. https://smithery.ai/console/toolbox 에서 Slack tools 확인

---

## 🔗 핵심 링크

| 서비스 | URL |
|--------|-----|
| GitHub 레포 | https://github.com/aigw2026-cpu/claude-mcp-workspace |
| Smithery Toolbox | https://smithery.ai/console/toolbox |
| Claude Desktop | https://claude.ai/download |
| Obsidian 계정 | https://obsidian.md/account |
| 체크리스트 원본 | https://github.com/aigw2026-cpu/claude-mcp-workspace/blob/main/TOMORROW-10AM-CHECKLIST.md |

