name: "☀️ Morning Reminder"

on:
  schedule:
    # 매일 오전 10시 KST = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  morning-checklist:
    runs-on: ubuntu-latest
    name: "☀️ 10시 체크리스트 업데이트"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate morning status report
        run: python3 -c "
import os
from datetime import datetime, timezone, timedelta

KST = timezone(timedelta(hours=9))
now = datetime.now(KST)
date_str = now.strftime('%Y-%m-%d')
time_str = now.strftime('%H:%M')
weekday = ['월', '화', '수', '목', '금', '토', '일'][now.weekday()]

report_dir = 'obsidian-vault/08-Morning-Reports'
os.makedirs(report_dir, exist_ok=True)

report_path = f'{report_dir}/{date_str}.md'
content = f'''---
date: {date_str}
tags: [morning-report, daily, auto-generated]
weekday: {weekday}
generated_at: {time_str} KST
status: ready
---

# ☀️ {date_str} ({weekday}) 아침 10시 체크리스트

> 간단 확인: https://github.com/aigw2026-cpu/claude-mcp-workspace

---

## ✅ 어제 완료된 것

- [x] Smithery 152 tools 활성화
- [x] GitHub SMITHERY_API_KEY Secret 등록
- [x] GitHub Actions #13 Success
- [x] Obsidian Sync Plus Active (갱신 06-24)

---

