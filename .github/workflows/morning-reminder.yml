
name: Morning Reminder

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  morning-checklist:
    runs-on: ubuntu-latest
    name: Morning 10AM Checklist

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate morning report
        run: python3 -c "
import os
from datetime import datetime, timezone, timedelta
KST = timezone(timedelta(hours=9))
now = datetime.now(KST)
date_str = now.strftime('%Y-%m-%d')
time_str = now.strftime('%H:%M')
report_dir = 'obsidian-vault/08-Morning-Reports'
os.makedirs(report_dir, exist_ok=True)
report_path = f'{report_dir}/{date_str}.md'
src = 'TOMORROW-10AM-CHECKLIST.md'
c = open(src).read() if os.path.exists(src) else f'# {date_str} Morning Checklist - see github.com/aigw2026-cpu/claude-mcp-workspace'
open(report_path, 'w', encoding='utf-8').write(c)
print('Done: ' + report_path)
"

      - name: Commit report
        run: |
          git config --local user.email "claude-mcp-bot@aigw2026.github"
          git config --local user.name "Claude MCP Bot"
          git add obsidian-vault/08-Morning-Reports/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "morning: daily checklist $(TZ=Asia/Seoul date '+%Y-%m-%d')"
            git push
          fi
