## 💡 완료 후 첫 테스트

Claude Desktop에서 이 프뉁트 실행:
> "Gmail 오늘 읽지 않은 이메일 요약 + Calendar 오늘 일정 + Notion에 오늘 일일 계획 페이지 만들어줘"

---

*자동 생성: {date_str} {time_str} KST | Claude MCP Bot 🤖*
'''
open(report_path, 'w', encoding='utf-8').write(content)
print(f'Morning report created: {report_path}')
"

      - name: Commit morning report
        run: |
          git config --local user.email "claude-mcp-bot@aigw2026.github"
          git config --local user.name "Claude MCP Bot"
          git add obsidian-vault/08-Morning-Reports/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "☀️ morning: $(TZ=Asia/Seoul date '+%Y-%m-%d') 아침 보고서 자동 생성"
            git push
          fi
